<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>紫陽花の種(2048系パズル)</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="hydrangeaBackdrop" class="hydrangea-backdrop" aria-hidden="true"></div>
    <main class="app" aria-label="紫陽花の種">
      <section class="topbar">
        <div>
          <p class="kicker">2,048系パズル</p>
          <div class="title-row">
            <h1>紫陽花の種</h1>
            <a class="help-link" href="#growthGuide" aria-label="成長過程ヒントへ移動">?</a>
          </div>
        </div>
        <div class="scores" aria-label="スコア">
          <div class="score-box">
            <span>Moves</span>
            <strong id="moves">0</strong>
          </div>
          <div class="score-box">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span id="bestLabel">Best</span>
            <strong id="best">0</strong>
          </div>
        </div>
      </section>

      <section class="game-shell">
        <div class="board-wrap">
          <div id="board" class="board" aria-label="ゲーム盤" role="grid"></div>
          <div id="overlay" class="overlay" hidden>
            <div class="overlay-panel">
              <h2 id="overlayTitle">Game Over</h2>
              <p id="overlayText">もう動かせるマスがありません。</p>
              <button id="overlayRestart" type="button">もう一度</button>
            </div>
          </div>
        </div>

        <aside class="side">
          <button id="restart" class="primary-button" type="button">新しく始める</button>
          <div class="direction-pad" aria-label="方向キー">
            <button class="direction-button up" type="button" data-direction="up" aria-label="上">↑</button>
            <button class="direction-button left" type="button" data-direction="left" aria-label="左">←</button>
            <button class="direction-button right" type="button" data-direction="right" aria-label="右">→</button>
            <button class="direction-button down" type="button" data-direction="down" aria-label="下">↓</button>
          </div>
          <div class="practice-card">
            <label class="practice-toggle">
              <input id="practiceMode" type="checkbox">
              <span>練習用モード</span>
            </label>
            <label class="practice-toggle">
              <input id="customSeedMode" type="checkbox">
              <span>カスタムシードモード</span>
            </label>
            <div id="seedPlacementHint" class="seed-placement-hint" aria-live="polite" hidden>
              <img src="image/seed.png" alt="種">
              <strong id="pendingSeedCount">0</strong>
            </div>
          </div>
          <div id="growthGuide" class="levels" aria-label="アジサイの成長過程ヒント">
            <ol id="levelList"></ol>
            <div class="bloom-rule" aria-label="花同士が重なると盤面から消えて背景に増えます">
              <span class="rule-tile level-6"><img src="image/flower.png" alt="花"></span>
              <span class="rule-symbol">+</span>
              <span class="rule-tile level-6"><img src="image/flower.png" alt="花"></span>
              <span class="rule-symbol">→</span>
              <span class="rule-backdrop vanish-mark"><img src="image/flower.png" alt="背景の紫陽花"></span>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
